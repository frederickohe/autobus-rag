# RAG stack: Qdrant (vectors) + TEI (Hugging Face embeddings) + thin HTTP API (tenant-scoped upsert/search).
# Usage from this directory:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d --build
#
# Shared network bootstrap (from systems/): .\setup-networks.ps1
# Autobus backend reaches the API at RAG_SERVICE_URL=http://greenbrain_rag_api:8088

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: greenbrain_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - rag_net

  # Hugging Face Text Embeddings Inference (CPU). Swap for a GPU tag if available.
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8.1
    container_name: greenbrain_tei
    restart: unless-stopped
    volumes:
      - tei_cache:/data
    environment:
      HUGGINGFACE_HUB_CACHE: /data
    command:
      - "--model-id"
      - "${EMBEDDING_MODEL_ID:-BAAI/bge-small-en-v1.5}"
      - "--port"
      - "80"
      - "--hostname"
      - "0.0.0.0"
    networks:
      - rag_net

  rag-api:
    build:
      context: ./rag-api
      dockerfile: Dockerfile
    container_name: greenbrain_rag_api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
      embeddings:
        condition: service_started
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://embeddings:80}
      RAG_COLLECTION_NAME: ${RAG_COLLECTION_NAME:-autobus_conversations}
      RAG_API_KEY: ${RAG_API_KEY:-change-me}
      VECTOR_SIZE: ${VECTOR_SIZE:-384}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${RAG_API_PORT:-8088}:8088"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8088/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rag_net
      - caddy

volumes:
  qdrant_storage:
  tei_cache:

networks:
  rag_net:
    driver: bridge
    name: greenbrain_rag
  caddy:
    external: true
    name: caddy
